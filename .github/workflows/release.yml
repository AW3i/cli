# Builds and publishes the valet Go CLI binaries for all supported platforms
# whenever a version tag (v*) is pushed to the repository.
#
# The resulting binaries are attached to the GitHub Release and can be
# downloaded by the install script.
#
# Naming convention: valet-<os>-<arch>
#   valet-linux-amd64
#   valet-linux-arm64
#   valet-darwin-amd64
#   valet-darwin-arm64

name: Release

on:
  push:
    tags:
      - "[0-9]*"

permissions:
  contents: write   # required to create GitHub Releases and upload assets

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: darwin
            goarch: arm64
            runner: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Go
        uses: actions/setup-go@v5.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          # Strip a leading "v" so the embedded version matches the tag_name
          # form the updater compares against (it TrimPrefix("v")s the API tag).
          VERSION="${GITHUB_REF_NAME#v}"
          OUTPUT="valet-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build \
            -trimpath \
            -ldflags "-s -w -X main.Version=${VERSION}" \
            -o "dist/${OUTPUT}" \
            ./cmd/valet

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: valet-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/valet-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Download all artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum valet-* > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "valet-sh CLI ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/valet-linux-amd64
            dist/valet-linux-arm64
            dist/valet-darwin-amd64
            dist/valet-darwin-arm64
            dist/checksums.txt
