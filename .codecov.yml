# Codecov configuration for Go CLI coverage reporting
coverage:
  status:
    project:
      default:
        target: 60%
        threshold: 5%
        base: auto
        if_no_uploads: error
        if_not_found: success
        if_ci_failed: error
        only_pulls: false
    patch:
      default:
        target: 60%
        threshold: 5%
        base: auto
        if_no_uploads: error
        if_not_found: success
        if_ci_failed: error
        only_pulls: true

# Ignore paths that are hard to test or are thin wrappers
ignore:
  - "cmd/**"              # Main entry points
  - "internal/ansible/**" # Subprocess exec
  - "**/*_test.go"        # Test files
  - "**/mock*.go"         # Mock implementations

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: true
  require_base: true
  require_head: true

flags:
  go:
    paths:
      - cli/
    carryforward: true
