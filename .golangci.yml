version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - gocritic
    - bodyclose
    - dogsled
    - unparam
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    govet:
      enable:
        - shadow
    gocritic:
      enabled-tags:
        - performance
        - style
        - experimental
      disabled-checks:
        - wrapperFunc
        - dupImport
  exclusions:
    presets: []
    paths:
      - "internal/config/global.go"
      - "internal/config/project.go"
    rules:
      - path: _test\.go
        linters: [gocyclo, errcheck, dupl, gosec, lll, funlen]
      - path: cmd/valet/main.go
        text: "os.Exit"
        linters: [gocritic]
      - text: "weak cryptographic primitive"
        linters: [gosec]
      - text: "G107"
        linters: [gosec]
      # syscall.Exec is intentional and documented
      - text: "G204"
        linters: [gosec]
      # logPath is a hardcoded constant, not user input
      - path: internal/tui/exec.go
        text: "G304"
        linters: [gosec]
      # Intentional blank assignments for best-effort operations
      - path: internal/commands/help.go
        linters: [errcheck]
      - path: internal/commands/helpers.go
        linters: [errcheck]
      - path: internal/updater/check.go
        linters: [errcheck]
      # Bubble Tea Elm architecture requires value receivers — hugeParam is expected
      - path: internal/tui/
        text: "hugeParam"
        linters: [gocritic]
      - path: internal/tui/exec.go
        linters: [errcheck]
      - path: internal/tui/runner.go
        linters: [errcheck]

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
